name: Build release binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            asset_name: tuya-smart-plug-exporter-linux-amd64
          - runner: ubuntu-24.04-arm
            asset_name: tuya-smart-plug-exporter-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python -m pip install -U pip

      - run: python -m pip install -r requirements.txt pyinstaller

      - run: pyinstaller --clean --onefile --name tuya-smart-plug-exporter tuya_smart_plug_exporter.py

      - run: mkdir -p release

      - run: cp dist/tuya-smart-plug-exporter release/${{ matrix.asset_name }}

      - run: cp config.example.yaml release/config.example.yaml

      - run: cd release && sha256sum ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: release/*

  build-windows:
    name: Build tuya-smart-plug-exporter-windows-amd64.exe
    runs-on: windows-2025

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python -m pip install -U pip

      - run: python -m pip install -r requirements.txt pyinstaller

      - run: pyinstaller --clean --onefile --name tuya-smart-plug-exporter tuya_smart_plug_exporter.py

      - run: New-Item -ItemType Directory -Force -Path release

      - run: Copy-Item dist\tuya-smart-plug-exporter.exe release\tuya-smart-plug-exporter-windows-amd64.exe

      - run: Copy-Item config.example.yaml release\config.example.yaml

      - run: |
          $hash = Get-FileHash release\tuya-smart-plug-exporter-windows-amd64.exe -Algorithm SHA256
          "$($hash.Hash.ToLower())  tuya-smart-plug-exporter-windows-amd64.exe" | Out-File -Encoding ascii release\tuya-smart-plug-exporter-windows-amd64.exe.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: tuya-smart-plug-exporter-windows-amd64
          path: release/*

  release:
    name: Upload release assets
    needs:
      - build-linux
      - build-windows
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - run: ls -la release-assets

      - run: gh release view "${GITHUB_REF_NAME}" || gh release create "${GITHUB_REF_NAME}" --generate-notes

      - run: gh release upload "${GITHUB_REF_NAME}" release-assets/* --clobber
        env:
          GH_TOKEN: ${{ github.token }}
