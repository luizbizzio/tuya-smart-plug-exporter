name: Build release binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            asset_name: tuya-smart-plug-exporter-linux-amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            asset_name: tuya-smart-plug-exporter-linux-arm64

    steps:
      - uses: actions/checkout@v6

      - run: mkdir -p release

      - run: |
          docker run --rm \
            --platform ${{ matrix.platform }} \
            -v "$PWD:/src" \
            -w /src \
            python:3.11-slim-bookworm \
            sh -c "apt-get update && apt-get install -y --no-install-recommends binutils && rm -rf /var/lib/apt/lists/* && python -m pip install -U pip && python -m pip install -r requirements.txt pyinstaller && pyinstaller --clean --onefile --name tuya-smart-plug-exporter tuya_smart_plug_exporter.py"

      - run: cp dist/tuya-smart-plug-exporter release/${{ matrix.asset_name }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: release/*

  build-windows-amd64:
    name: Build tuya-smart-plug-exporter-windows-amd64.exe
    runs-on: windows-2025
    defaults:
      run:
        shell: powershell

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          architecture: "x64"

      - run: python -m pip install -U pip

      - run: python -m pip install -r requirements.txt pyinstaller

      - run: pyinstaller --clean --onefile --name tuya-smart-plug-exporter tuya_smart_plug_exporter.py

      - run: New-Item -ItemType Directory -Force -Path release

      - run: Copy-Item dist\tuya-smart-plug-exporter.exe release\tuya-smart-plug-exporter-windows-amd64.exe

      - uses: actions/upload-artifact@v7
        with:
          name: tuya-smart-plug-exporter-windows-amd64
          path: release/*

  release:
    name: Upload release assets
    needs:
      - build-linux
      - build-windows-amd64
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - run: cp config.example.yaml release-assets/config.example.yaml

      - run: ls -la release-assets

      - run: gh release view "${GITHUB_REF_NAME}" || gh release create "${GITHUB_REF_NAME}" --generate-notes

      - run: gh release upload "${GITHUB_REF_NAME}" release-assets/* --clobber
